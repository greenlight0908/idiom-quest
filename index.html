<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>사자성어 여행단</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="favicon.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#1b1830">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="사자성어">
<style>
@font-face {
  font-family: 'NeoDGM';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2105_2@1.0/NeoDunggeunmoPro-Regular.woff') format('woff');
  font-display: swap;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --ink:#1b1830; --night:#2a2545; --paper:#f5ead8;
  --lantern:#ffb85c; --pink:#ff9eb5; --danger:#e8636f; --jade:#6fc99a;
}
html,body{height:100%;}
body{
  font-family:'NeoDGM',monospace; background:var(--ink); color:var(--paper);
  display:flex; align-items:center; justify-content:center; padding:8px;
  touch-action:manipulation; overflow-x:hidden;
}
#wrap{ width:100%; max-width:520px; }
#hud{
  display:flex; justify-content:space-between; align-items:center;
  font-size:13px; padding:6px 10px; letter-spacing:1px;
  border:3px solid var(--paper); border-bottom:none; border-radius:10px 10px 0 0;
  background:var(--night); min-height:32px;
}
#hud .prog{ color:var(--lantern); }
#stage-wrap{ position:relative; border:3px solid var(--paper); background:#000; border-radius:0 0 10px 10px; overflow:hidden; }
canvas#cv{ display:block; width:100%; image-rendering:pixelated; }
#dlg{
  position:absolute; left:8px; right:8px; bottom:8px;
  background:#1b1830ee; border:3px solid var(--paper); border-radius:8px;
  padding:12px 12px 16px; font-size:14px; line-height:1.7;
  min-height:78px; display:none; cursor:pointer; word-break:keep-all;
}
#dlg .speaker{
  position:absolute; top:-13px; left:10px;
  background:var(--lantern); color:var(--ink);
  padding:1px 10px; font-size:12px; border:2px solid var(--ink); border-radius:8px;
}
#dlg .cursor{ position:absolute; right:10px; bottom:4px; color:var(--lantern); animation:blink .9s steps(1) infinite; }
@keyframes blink{50%{opacity:0;}}
#modal{ position:absolute; inset:0; display:none; background:#000000c8; padding:14px; overflow-y:auto; }
#modal .box{
  background:var(--night); border:3px solid var(--paper); border-radius:12px;
  padding:16px 14px; margin:auto; max-width:440px; box-shadow:5px 5px 0 #00000088;
}
#modal .box.mini{ margin-top:12%; }
.qtext{ font-size:14px; line-height:1.7; margin-bottom:14px; word-break:keep-all; }
.qtext .tag{ color:var(--lantern); }
.title-big{ font-size:34px; text-align:center; letter-spacing:6px; margin:6px 0 12px; text-shadow:3px 3px 0 #00000066; }
.red{ color:var(--danger);} .green{ color:var(--jade);} .yellow{ color:var(--lantern);}
button.opt, button.btn{
  font-family:inherit; font-size:15px; width:100%;
  background:var(--ink); color:var(--paper);
  border:3px solid var(--paper); border-radius:8px; padding:11px 12px;
  text-align:left; cursor:pointer; margin-bottom:8px; letter-spacing:1px;
}
button.btn{ text-align:center; }
button.opt:hover,button.opt:focus-visible,button.btn:hover,button.btn:focus-visible{
  background:var(--lantern); color:var(--ink); border-color:var(--lantern);
  outline:none; box-shadow:3px 3px 0 #00000066;
}
button.btn.primary{ background:var(--lantern); color:var(--ink); border-color:var(--ink); box-shadow:3px 3px 0 #00000066; }
.explain{
  background:var(--ink); border:3px solid var(--danger); border-radius:8px;
  padding:10px 12px; font-size:13px; line-height:1.7; margin:10px 0; word-break:keep-all;
}
.explain.good{ border-color:var(--jade); }
.explain b{ color:var(--lantern); }
input#nameInput{
  font-family:inherit; font-size:17px; width:100%; padding:11px;
  background:var(--ink); color:var(--lantern);
  border:3px solid var(--paper); border-radius:8px;
  text-align:center; letter-spacing:2px; margin-bottom:10px;
}
input#nameInput:focus{ outline:none; border-color:var(--lantern); }
#fade{
  position:absolute; inset:0; background:#000; opacity:0;
  pointer-events:none; transition:opacity 1s;
  display:flex; align-items:center; justify-content:center;
  font-size:16px; text-align:center; line-height:2; padding:20px; word-break:keep-all;
}
#pad{
  display:flex; gap:8px; justify-content:center; margin-top:8px;
}
#pad button{
  font-family:inherit; font-size:19px; width:23%; max-width:76px; height:46px;
  background:var(--night); color:var(--paper);
  border:3px solid var(--paper); border-radius:12px; cursor:pointer; user-select:none;
  touch-action:manipulation;
}
#pad button:active{ background:var(--lantern); color:var(--ink); }
.hint{ font-size:11px; color:#9a917e; text-align:center; margin-top:8px; }
@media (max-width:480px){
  body{ padding:4px; }
  .hint{ display:none; }
  #pad button{ height:42px; }
  #hud{ min-height:28px; font-size:12px; padding:4px 8px; }
}
.shake{ animation:shake .5s; }
@keyframes shake{0%,100%{transform:translate(0,0);}20%{transform:translate(-8px,4px);}40%{transform:translate(8px,-4px);}60%{transform:translate(-6px,-4px);}80%{transform:translate(6px,4px);}}
@media (prefers-reduced-motion: reduce){ .shake, #dlg .cursor{animation:none;} #fade{transition:none;} }
</style>
</head>
<body>
<div id="wrap">
  <div id="hud"><span id="hudL">사자성어 여행단</span><span class="prog" id="hudR"></span></div>
  <div id="stage-wrap">
    <canvas id="cv" width="480" height="352"></canvas>
    <div id="dlg"><span class="speaker" id="dlgSp"></span><div id="dlgTxt"></div><span class="cursor">▼</span></div>
    <div id="modal"></div>
    <div id="fade"></div>
  </div>
  <div id="pad">
    <button data-d="left">◀</button>
    <button data-d="up">▲</button>
    <button data-d="down">▼</button>
    <button data-d="right">▶</button>
  </div>
  <p class="hint">이동: 방향키 · WASD · 화면 버튼　/　대화 넘기기: 화면 터치 · 스페이스</p>
</div>

<script>
"use strict";
/* ═══════════════ 사자성어 50 ═══════════════ */
const IDIOMS = [
["망양보뢰","亡羊補牢","양을 잃고 우리를 고침. 일이 잘못된 뒤에 손을 써도 이미 늦음","시험이 다 끝난 뒤에야 부랴부랴 오답 노트를 만들며 후회하는 학생"],
["화사첨족","畫蛇添足","뱀을 그리고 발을 더함. 쓸데없는 군일로 도리어 일을 그르침","다 쓴 답안지에 괜한 문장을 덧붙였다가 오히려 감점당한 수험생"],
["정저지와","井底之蛙","우물 안 개구리. 견문이 좁아 넓은 세상을 알지 못함","우리 반 1등이 곧 전국 1등인 줄 아는 학생"],
["조삼모사","朝三暮四","눈앞의 차이만 알고 결과가 같음을 모름. 잔꾀로 남을 속임","도토리를 '아침 3개, 저녁 4개'에서 '아침 4개, 저녁 3개'로 바꿔 주자 기뻐하는 원숭이들"],
["고진감래","苦盡甘來","쓴 것이 다하면 단 것이 옴. 고생 끝에 즐거움이 옴","삼 년의 재수 끝에 마침내 합격 통지서를 받아 든 수험생"],
["결초보은","結草報恩","풀을 묶어 은혜를 갚음. 죽어서라도 은혜를 잊지 않고 갚음","흉년에 목숨을 구해 준 은인의 은혜를 평생 잊지 않고 갚으려는 사람"],
["청출어람","靑出於藍","쪽에서 나온 물감이 쪽보다 푸름. 제자가 스승보다 뛰어남","스승의 글솜씨를 어느새 훌쩍 뛰어넘은 제자"],
["표리부동","表裏不同","겉과 속이 같지 않음. 마음이 음흉하여 겉과 속이 다름","겉으로는 친절한 척하면서 뒤로는 험담을 일삼는 사람"],
["구사일생","九死一生","아홉 번 죽을 뻔하다 한 번 살아남. 죽을 고비를 여러 번 넘김","급류에 휩쓸렸다가 나뭇가지를 붙잡고 간신히 살아난 뱃사공"],
["적반하장","賊反荷杖","도둑이 도리어 매를 듦. 잘못한 사람이 도리어 성을 냄","새치기를 해 놓고 도리어 뒷사람에게 큰소리치는 사람"],
["각주구검","刻舟求劍","뱃전에 표시를 새겨 칼을 찾음. 융통성 없이 낡은 생각을 고집함","강물에 칼을 빠뜨리고는 움직이는 뱃전에 자국을 새겨 두는 사람"],
["온고지신","溫故知新","옛것을 익히고 그것을 미루어 새것을 앎","고전 문학을 깊이 공부하여 오늘날의 글쓰기에 활용하는 학생"],
["유비무환","有備無患","미리 준비가 되어 있으면 근심할 것이 없음","장마가 오기 전에 미리 지붕을 손봐 피해를 면한 집"],
["설상가상","雪上加霜","눈 위에 서리가 덮임. 난처한 일이나 불행이 잇따라 일어남","늦잠으로 지각한 날에 하필 쪽지 시험까지 겹친 학생"],
["금상첨화","錦上添花","비단 위에 꽃을 더함. 좋은 일 위에 좋은 일이 더해짐","성적도 오르고 장학금까지 받게 된 학생"],
["동병상련","同病相憐","같은 병자끼리 서로 가엾게 여김. 처지가 비슷한 사람끼리 동정함","재수생끼리 서로의 힘든 처지를 알아주고 위로하는 모습"],
["이심전심","以心傳心","마음에서 마음으로 뜻이 전해짐","말하지 않아도 눈빛만으로 뜻이 통하는 오랜 단짝"],
["어부지리","漁夫之利","둘이 다투는 사이에 엉뚱한 제삼자가 이익을 챙김","조개와 도요새가 물고 물리며 다투는 틈에 지나가던 어부가 둘 다 잡아감"],
["오비이락","烏飛梨落","까마귀 날자 배 떨어짐. 우연히 일이 겹쳐 억울하게 의심받음","하필 물건이 없어진 순간에 그 자리를 지나가는 바람에 의심받는 사람"],
["우공이산","愚公移山","우공이 산을 옮김. 꾸준히 노력하면 반드시 이룸","매일 한 문제씩 십 년을 풀어 기어이 목표를 이룬 사람"],
["사면초가","四面楚歌","사방에서 들리는 초나라 노래. 도움 없이 완전히 고립된 처지","지원군도 퇴로도 없이 사방을 포위당한 장수"],
["전화위복","轉禍爲福","재앙이 바뀌어 오히려 복이 됨","시험 낙방을 계기로 오히려 더 잘 맞는 길을 찾게 된 사람"],
["대기만성","大器晩成","큰 그릇은 늦게 만들어짐. 크게 될 사람은 늦게 이루어짐","남들보다 늦게 시작했지만 마침내 대가의 반열에 오른 예술가"],
["감언이설","甘言利說","달콤한 말과 이로운 조건으로 남을 꾀는 말","'이 문제집만 풀면 무조건 1등급'이라며 꼬드기는 장사꾼"],
["견물생심","見物生心","물건을 보면 그것을 가지고 싶은 욕심이 생김","진열장의 최신 게임기를 보자 갑자기 사고 싶어진 마음"],
["과유불급","過猶不及","지나침은 미치지 못함과 같음","몸에 좋다는 보약을 지나치게 먹다가 도리어 탈이 난 사람"],
["다다익선","多多益善","많으면 많을수록 더욱 좋음","'병사는 많을수록 좋습니다'라고 답한 한신"],
["등하불명","燈下不明","등잔 밑이 어두움. 가까이 있는 것을 도리어 알지 못함","온 집을 다 뒤졌는데 찾던 안경이 제 머리 위에 있던 상황"],
["마이동풍","馬耳東風","말의 귀에 스치는 동풍. 남의 말을 귀담아듣지 않고 흘려버림","아무리 충고해도 한 귀로 듣고 한 귀로 흘리는 친구"],
["문전성시","門前成市","문 앞이 시장을 이룸. 찾아오는 사람이 매우 많음","맛집으로 소문이 나 새벽부터 문 앞에 줄이 늘어선 가게"],
["배은망덕","背恩忘德","남에게 입은 은덕을 저버리고 배신함","어려울 때 도와준 친구를 성공하자마자 모른 척하는 사람"],
["부화뇌동","附和雷同","줏대 없이 남의 의견에 따라 움직임","남들이 산다니까 이유도 모른 채 덩달아 따라 사는 사람"],
["살신성인","殺身成仁","자기 몸을 희생하여 옳은 일을 이룸","승객을 구하려고 불길 속으로 뛰어든 기관사"],
["새옹지마","塞翁之馬","변방 노인의 말. 인생의 길흉화복은 예측할 수 없음","아끼던 말을 잃은 일이 돌고 돌아 오히려 복이 된 변방의 노인"],
["수주대토","守株待兎","그루터기를 지키며 토끼를 기다림. 노력 없이 요행만 바람","한 번 얻어걸린 요행을 또 바라며 밭일을 놓아 버린 농부"],
["순망치한","脣亡齒寒","입술이 없으면 이가 시림. 한쪽이 망하면 다른 쪽도 위태로움","이웃 나라가 무너지자 덩달아 위태로워진 나라"],
["십시일반","十匙一飯","열 숟가락이 모여 밥 한 그릇. 여럿이 조금씩 도우면 큰 힘이 됨","반 친구들이 조금씩 용돈을 모아 수해 성금을 마련한 일"],
["아전인수","我田引水","제 논에 물 대기. 자기에게만 이롭게 생각하거나 행동함","같은 규칙도 자기에게 유리한 쪽으로만 해석하는 사람"],
["안하무인","眼下無人","눈 아래에 사람이 없음. 방자하고 교만하여 남을 업신여김","조금 유명해지자 아무도 안중에 두지 않고 함부로 구는 사람"],
["역지사지","易地思之","처지를 바꾸어서 생각하여 봄","다투기 전에 먼저 상대의 입장이 되어 생각해 보는 태도"],
["오리무중","五里霧中","오 리에 걸친 짙은 안개 속. 갈피를 잡을 수 없음","단서가 하나도 없어 수사가 완전히 미궁에 빠진 사건"],
["와신상담","臥薪嘗膽","섶에 눕고 쓸개를 맛봄. 목표를 위해 온갖 괴로움을 참고 견딤","패배의 굴욕을 잊지 않으려 매일 쓴 쓸개를 핥으며 힘을 기른 왕"],
["용두사미","龍頭蛇尾","용의 머리에 뱀의 꼬리. 시작은 거창하나 끝이 흐지부지함","첫 주만 불타오르고 흐지부지 끝난 새해 계획"],
["우유부단","優柔不斷","어물어물 망설이기만 하고 결단성이 없음","점심 메뉴 하나 고르는 데 삼십 분이 걸리는 사람"],
["유유상종","類類相從","같은 무리끼리 서로 사귐","책 좋아하는 사람들끼리 자연스럽게 모여 만들어진 독서 모임"],
["일석이조","一石二鳥","돌 하나로 새 두 마리를 잡음. 한 가지 일로 두 가지 이익을 얻음","운동 삼아 걸어 다녔더니 건강도 챙기고 차비까지 아낀 일"],
["임기응변","臨機應變","그때그때 처한 형편에 맞추어 일을 알맞게 처리함","발표 자료가 열리지 않자 그 자리에서 판서로 발표를 이어 간 학생"],
["자업자득","自業自得","자기가 저지른 일의 결과를 자기가 받음","밤새 게임을 하다 시험을 망치고 후회하는 학생"],

/* ── 학생 캐릭터 ── */
function drawStudent(s){

  ctx.fillStyle="#00000030"; ctx.beginPath(); ctx.ellipse(X+16,Y+28,10,3,0,0,7); ctx.fill();
  if(s.type==="dog"){
    ctx.fillStyle="#8a5a2b"; rr(X+7,Y+14+bob,18,12,6); ctx.fill();
    ctx.fillStyle="#a06b35";
    ctx.beginPath(); ctx.arc(X+16,Y+10+bob,9,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(X+9,Y+5+bob,4,0,7); ctx.arc(X+16,Y+3+bob,4.5,0,7); ctx.arc(X+23,Y+5+bob,4,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(X+6,Y+13+bob,3.5,0,7); ctx.arc(X+26,Y+13+bob,3.5,0,7); ctx.fill();
    ctx.fillStyle="#2a2a2a"; ctx.fillRect(X+12,Y+8+bob,2,3); ctx.fillRect(X+18,Y+8+bob,2,3);
    ctx.fillStyle="#1a1a1a"; ctx.beginPath(); ctx.arc(X+16,Y+13+bob,2,0,7); ctx.fill();
    ctx.fillStyle="#a06b35"; ctx.beginPath(); ctx.arc(X+27,Y+19+bob,3,0,7); ctx.fill();
  } else {
    const hair={boy1:"#2a2a2a",boy2:"#5a3a22",girl1:"#7c4a1e",girl2:"#1a1a1a"}[s.type];
    const cloth={boy1:"#4a6fb5",boy2:"#3f7f5f",girl1:"#e8b23a",girl2:"#d977a8"}[s.type];
    const girl=s.type.startsWith("girl");
    ctx.fillStyle=cloth; rr(X+7,Y+16+bob,18,11,5); ctx.fill();
    ctx.fillStyle="#ffe0bd"; rr(X+6,Y+2+bob,20,17,8); ctx.fill();
    ctx.fillStyle=hair; rr(X+5,Y+bob,22,8,7); ctx.fill();
    if(girl){ ctx.fillRect(X+4,Y+4+bob,4,14); ctx.fillRect(X+24,Y+4+bob,4,14); }
    else { ctx.fillRect(X+5,Y+4+bob,3,5); ctx.fillRect(X+24,Y+4+bob,3,5); }
    ctx.fillStyle="#2a2a2a"; ctx.fillRect(X+11,Y+10+bob,3,4); ctx.fillRect(X+18,Y+10+bob,3,4);
    ctx.fillStyle="#ffb3ab"; ctx.fillRect(X+8,Y+14+bob,3,2); ctx.fillRect(X+21,Y+14+bob,3,2);
  }
  ctx.fillStyle="#fff3dd"; ctx.font="8px NeoDGM,monospace"; ctx.textAlign="center";
  ctx.fillText(s.name, X+TILE/2, Y-2);
}

function render(){
  T=performance.now()/1000;
  ctx.clearRect(0,0,cv.width,cv.height);
  if(scene==="cafe") drawCafe(); else { drawHell(); drawStatues(); drawYeomra(); }
  if(mode!=="title") drawPlayer();
  // 따뜻한 비네트(카페만)
  if(scene==="cafe"){
    const g=ctx.createRadialGradient(cv.width/2,cv.height/2,120,cv.width/2,cv.height/2,320);
    g.addColorStop(0,"#ffb85c00"); g.addColorStop(1,"#7a4a1a2e");
    ctx.fillStyle=g; ctx.fillRect(0,0,cv.width,cv.height);
  }
  requestAnimationFrame(render);
}
requestAnimationFrame(render);

/* ═══════════════ 대화 시스템 ═══════════════ */
function showDialog(lines, done){
  dialogQueue=[...lines]; dialogDone=done||null;
  dlg.style.display="block"; nextDialog();
}
function nextDialog(){
  if(typing){ clearInterval(typing); typing=null; dlgTxt.textContent=fullText; return; }
  if(dialogQueue.length===0){
    dlg.style.display="none";
    const cb=dialogDone; dialogDone=null;
    if(cb) cb(); return;
  }
  const {sp,text}=dialogQueue.shift();
  dlgSp.textContent=sp; fullText=text; dlgTxt.textContent="";
  let i=0;
  typing=setInterval(()=>{
    dlgTxt.textContent=fullText.slice(0,++i);
    if(i>=fullText.length){ clearInterval(typing); typing=null; }
  },26);
}
dlg.addEventListener("click", nextDialog);
cv.addEventListener("click", ()=>{ if(dlg.style.display==="block") nextDialog(); });

/* ═══════════════ 이동 ═══════════════ */
const DIRS={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]};
function tryMove(d){
  if(mode!=="cafe"&&mode!=="explore") return;
  if(dlg.style.display==="block"||modal.style.display==="block") return;
  dir=d;
  const [dx,dy]=DIRS[d];
  const nx=px+dx, ny=py+dy;
  if(scene==="cafe"){
    const stu=studentAt(nx,ny);
    if(stu){ dir=d; showDialog([{sp:stu.name, text:stu.line}]); return; }
  }
  if(scene==="hell"){
    const st=statueAt(nx,ny);
    if(st){ if(!st.cleared) openQuiz(st); return; }
    if(nx===EXIT[0]&&ny===EXIT[1]){ openExitConfirm(); return; }
  }
  if(blocked(nx,ny)) return;
  px=nx; py=ny; stepFrame++;
  if(scene==="cafe" && mode==="cafe" && px===EMPTY_SEAT[0] && py===EMPTY_SEAT[1]) openSeatChoice();
}
document.addEventListener("keydown",e=>{
  const k=e.key;
  if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(k)) e.preventDefault();
  if(dlg.style.display==="block" && (k===" "||k==="Enter"||k==="z"||k==="Z")){ nextDialog(); return; }
  const map={ArrowUp:"up",w:"up",W:"up",ArrowDown:"down",s:"down",S:"down",ArrowLeft:"left",a:"left",A:"left",ArrowRight:"right",d:"right",D:"right"};
  if(map[k]) tryMove(map[k]);
});
/* 캔버스 스와이프로 이동 */
let swX=0, swY=0, swT=0;
cv.addEventListener("touchstart",e=>{
  if(e.touches.length!==1) return;
  swX=e.touches[0].clientX; swY=e.touches[0].clientY; swT=Date.now();
},{passive:true});
cv.addEventListener("touchend",e=>{
  const t=e.changedTouches[0];
  const dx=t.clientX-swX, dy=t.clientY-swY;
  const dist=Math.hypot(dx,dy);
  if(dist<24 || Date.now()-swT>600) return; // 짧으면 탭으로 처리
  const dirName=Math.abs(dx)>Math.abs(dy) ? (dx>0?"right":"left") : (dy>0?"down":"up");
  const steps=Math.min(4, Math.floor(dist/48)+1);
  for(let i=0;i<steps;i++) tryMove(dirName);
},{passive:true});
document.querySelectorAll("#pad button").forEach(b=>{
  let t=null;
  const go=()=>tryMove(b.dataset.d);
  b.addEventListener("pointerdown",e=>{e.preventDefault();go();t=setInterval(go,170);});
  ["pointerup","pointerleave","pointercancel"].forEach(ev=>b.addEventListener(ev,()=>{clearInterval(t);t=null;}));
});

    <div class="box mini">
      <p class="qtext">${eun(playerName)} 자리에 앉았다.<br>자, 이제 무엇을 할까?</p>
      <button class="opt" data-c="0">1. 공부한다 📖</button>
      <button class="opt" data-c="1">2. 유튜브를 본다 📱</button>
      <button class="opt" data-c="2">3. 멍하니 있는다 🫥</button>
    </div>`);
  modal.querySelectorAll(".opt").forEach(b=>b.onclick=()=>{ closeModal(); afterChoice(+b.dataset.c); });
}
function afterChoice(c){
  const lines=[
    [{sp:"내레이션",text:`${eun(playerName)} 굳은 결심으로 책을 폈다.`},
     {sp:"내레이션",text:"...5분 뒤. 글자가 눈에 들어오지 않는다. 눈꺼풀이 무거워진다."}],
    [{sp:"내레이션",text:`"딱 한 편만 봐야지." ${eun(playerName)} 유튜브를 켰다.`},
     {sp:"내레이션",text:"...정신을 차려 보니 세 시간이 지나 있었다. 눈꺼풀이 무거워진다."}],
    [{sp:"내레이션",text:`${eun(playerName)} 창밖을 바라보며 멍하니 앉아 있었다.`},
     {sp:"내레이션",text:"...시간은 하염없이 흐르고, 눈꺼풀이 무거워진다."}]
  ][c];
  showDialog(lines, ()=>{
    fade.innerHTML=`잠시 후...<br><br>💤<br><br>${eun(playerName)} 잠이 들었다.`;
    fade.style.opacity=1; fade.style.pointerEvents="auto";
    setTimeout(()=>{ enterHell(); },2600);
  });
}

/* ═══════════════ ② 한자성어 나라 ═══════════════ */
function enterHell(){
  scene="hell"; px=7; py=8; dir="up";
  statues=[]; cleared=0; yeomraVisible=true;
  hudL.textContent=`${playerName} · 한자성어 나라`; hudR.textContent="";
  fade.innerHTML=""; fade.style.opacity=0; fade.style.pointerEvents="none";
  mode="locked";
  setTimeout(()=>{
    showDialog([
      {sp:playerName, text:"...여긴 어디지?"},
      {sp:"염라대왕", text:"눈을 떴느냐. 이곳은 이승과 저승 사이, 한자성어 나라이니라."},
      {sp:"염라대왕", text:"너는 죄를 저질렀으므로, 이 한자성어 나라를 모험해야 한다."},
      {sp:playerName, text:"제, 제가 무슨 죄를 저질렀죠?"},
      {sp:"염라대왕", text:"공부하지 않은 죄. 최선을 다하지 않은 죄."},
      {sp:"염라대왕", text:"최선을 다하지 않았으면서 최선을 다한 척한 죄. 주변을 속이고, 결국 자신까지 속인 죄."},
      {sp:"염라대왕", text:"결국 공부한 것도 안 한 것도 아닌 채 시간을 낭비한 죄. ...그 죄를 달게 받아라."},
      {sp:"내레이션", text:"염라대왕이 연기처럼 사라지고, 사방에 석상들이 나타났다!"},
      {sp:"내레이션", text:`석상 ${STATUE_COUNT}개에 봉인된 사자성어를 모두 풀어야 이승으로 돌아갈 수 있다.`}
    ], ()=>{
      yeomraVisible=false; spawnStatues(); mode="explore"; updateHud();
    });
  },400);
}
function spawnStatues(){
  const icons=shuffle(STATUE_ICONS).slice(0,STATUE_COUNT);
  const idioms=shuffle(IDIOMS).slice(0,STATUE_COUNT);
  const cells=[];
  for(let y=2;y<=8;y++)for(let x=1;x<=13;x++){
    if(x===px&&y===py) continue;
    if(Math.abs(x-px)+Math.abs(y-py)<=1) continue;
    cells.push([x,y]);
  }
  const spots=shuffle(cells).slice(0,STATUE_COUNT);
  statues=spots.map(([x,y],i)=>({x,y,icon:icons[i],idiom:idioms[i],cleared:false}));
  runStart=Date.now(); finished=false;
  requestToken();
}
const fmt=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(Math.floor(s%60)).padStart(2,"0")}`;
function updateHud(){
  const t=(runStart&&!finished)? ` · ⏱ ${fmt((Date.now()-runStart)/1000)}` : "";
  hudR.textContent=`✨ 석상 정화 ${cleared}/${STATUE_COUNT}${t}`;
}
setInterval(()=>{ if(scene==="hell"&&runStart&&!finished) updateHud(); },500);

/* ═══════════════ 순위표 저장 ═══════════════ */
async function lbLoad(){
  if(window.storage){
    try{ const r=await window.storage.get("idiom_lb"); return r?JSON.parse(r.value):[]; }
    catch(e){ return []; }
  }
  try{ const v=localStorage.getItem("idiom_lb"); return v?JSON.parse(v):memLB; }catch(e){ return memLB; }
}
async function lbSave(list){
  memLB=list;
  if(window.storage){ try{ await window.storage.set("idiom_lb", JSON.stringify(list)); return; }catch(e){} }
  try{ localStorage.setItem("idiom_lb", JSON.stringify(list)); }catch(e){}
}
async function requestToken(){
  sessionToken=null;
  if(!SERVER_URL) return;
  try{
    const res=await fetch(SERVER_URL,{
      method:"POST",
      headers:{"Content-Type":"text/plain"},
      body:JSON.stringify({action:"start"})
    });
    const j=await res.json();
    if(j&&j.ok&&j.token) sessionToken=j.token;
  }catch(e){}
}
async function submitScore(name){
  if(!SERVER_URL||!sessionToken) return null;
  try{
    const res=await fetch(SERVER_URL,{
      method:"POST",
      headers:{"Content-Type":"text/plain"},
      body:JSON.stringify({action:"finish", token:sessionToken, name})
    });
    const j=await res.json();
    sessionToken=null;
    return (j&&j.ok)? j.sec : null;
  }catch(e){ return null; }
}
async function fetchGlobalLB(){
    const res=await fetch(SERVER_URL+"?t="+Date.now(),{cache:"no-store"});
  if(!res.ok) throw new Error("server");
  const list=await res.json();
  return list.sort((a,b)=>a.sec-b.sec);
}
async function showRankingModal(){
  openModal(`<div class="box mini"><p class="qtext" style="text-align:center;">랭킹을 불러오는 중...</p></div>`);
  let list=[], label="이 기기 기록";
  if(SERVER_URL){
    try{ list=await fetchGlobalLB(); label="전체 통합 랭킹"; }
    catch(e){ list=await lbLoad(); }
  } else { list=await lbLoad(); }
  list.sort((a,b)=>a.sec-b.sec);
  const rows=list.slice(0,20).map((e,i)=>
    `<div style="display:flex;justify-content:space-between;gap:8px;"><span>${i+1}위　${e.name}</span><span>${fmt(e.sec)}</span></div>`
  ).join("") || `<div style="text-align:center;">아직 기록이 없습니다</div>`;
  openModal(`
    <div class="box">
      <div class="title-big yellow" style="font-size:24px; letter-spacing:2px;">👑 ${label}</div>
      <div class="explain good">${rows}</div>
      <button class="btn primary" id="closeLb">닫기</button>
    </div>`);
  document.getElementById("closeLb").onclick=()=>{ closeModal(); showTitle(); };
}
async function addRecord(name,sec){
  const list=await lbLoad();
  const entry={name, sec:Math.round(sec), ts:Date.now()};
  list.push(entry);
  list.sort((a,b)=>a.sec-b.sec || a.ts-b.ts);
  const rank=list.indexOf(entry)+1;
  const trimmed=list.slice(0,50);
  await lbSave(trimmed);
  return {list:trimmed, rank, entry};
}

/* ═══════════════ 퀴즈 ═══════════════ */
function openQuiz(st){
  mode="locked";
  const [w,h,m,s]=st.idiom;
  const r=Math.random();
  let qhtml, options, answerIdx, correctSitu=null, optIdioms=null;
  if(r<0.70){
    /* 유형 1: 상황 제시 → 사자성어 고르기 */
    const wrongIds=shuffle(IDIOMS.filter(i=>i[0]!==w)).slice(0,3);
    options=shuffle([w,...wrongIds.map(i=>i[0])]);
    answerIdx=options.indexOf(w);
    optIdioms=options.map(o=>o===w?st.idiom:wrongIds.find(i=>i[0]===o));
    qhtml=`<span class="tag">【상황】</span> ${s}<br><br>이 상황에 가장 가까운 사자성어는?`;
  } else if(r<0.90){
    /* 유형 2: 사자성어 제시 → 알맞은 상황 고르기 */
    const wrongs=shuffle(IDIOMS.filter(i=>i[0]!==w)).slice(0,3).map(i=>i[3]);
    options=shuffle([s,...wrongs]);
    answerIdx=options.indexOf(s);
    correctSitu=s;
    qhtml=`<span class="tag">【${w}(${h})】</span><br>이 사자성어를 쓰기에 가장 알맞은 상황은?`;
  } else {
    /* 유형 3: 뜻 제시 → 사자성어 고르기 */
    const wrongIds=shuffle(IDIOMS.filter(i=>i[0]!==w)).slice(0,3);
    options=shuffle([w,...wrongIds.map(i=>i[0])]);
    answerIdx=options.indexOf(w);
    optIdioms=options.map(o=>o===w?st.idiom:wrongIds.find(i=>i[0]===o));
    qhtml=`<span class="tag">【뜻】</span> ${m}<br><br>이 뜻을 가진 사자성어는?`;
  }
  openModal(`
    <div class="box">
      <p class="qtext" style="text-align:center; font-size:24px; margin-bottom:6px;">${st.icon}</p>
      <p class="qtext">${qhtml}</p>
      ${options.map((o,i)=>`<button class="opt" data-i="${i}">${i+1}. ${o}</button>`).join("")}
    </div>`);
  modal.querySelectorAll(".opt").forEach(b=>{
    b.onclick=()=>{
      const i=+b.dataset.i;
      if(i===answerIdx) quizCorrect(st);
      else quizDeath(options[i], st.idiom, correctSitu, optIdioms);
    };
  });
  const keyH=e=>{
    const n=parseInt(e.key);
    if(n>=1&&n<=4){ const btn=modal.querySelectorAll(".opt")[n-1]; if(btn){ document.removeEventListener("keydown",keyH); btn.click(); } }
  };
  document.addEventListener("keydown",keyH);
  modal._keyH=keyH;
}
function quizCorrect(st){
  if(modal._keyH) document.removeEventListener("keydown",modal._keyH);
  const [w,h,m]=st.idiom;
  st.cleared=true; cleared++; updateHud();
  openModal(`
    <div class="box mini">
      <p class="qtext green" style="text-align:center; font-size:20px;">🎉 정답! 석상의 봉인이 풀렸다</p>
      <div class="explain good"><b>${w}(${h})</b><br>${m}</div>
      <button class="btn primary" id="okBtn">${cleared>=STATUE_COUNT?"...?":"계속 탐험한다"}</button>
    </div>`);
  document.getElementById("okBtn").onclick=()=>{
    closeModal();
    if(cleared>=STATUE_COUNT) winSequence(); else mode="explore";
  };
}
function quizDeath(pick, idiom, correctSitu, optIdioms){
  if(modal._keyH) document.removeEventListener("keydown",modal._keyH);
  const [w,h,m]=idiom;
  document.getElementById("stage-wrap").classList.add("shake");
  setTimeout(()=>document.getElementById("stage-wrap").classList.remove("shake"),600);
  const situLine = correctSitu ? `<br>알맞은 상황: <b>${correctSitu}</b>` : "";
  openModal(`
    <div class="box">
      <div class="title-big red">사 망</div>
      <p class="qtext">${eun(playerName)} 한자성어 나라에서 스러졌다...<br>염라대왕의 목소리가 들려온다. "공부하지 않은 죄가 이리도 무겁구나."</p>
      <div class="explain">
        네가 고른 답: <b>${pick}</b><br>정답: <b>${w}(${h})</b>${situLine}<br><br>${m}
      </div>
      ${optIdioms?`<div class="explain good"><b>보기 사자성어의 올바른 뜻</b><br>${optIdioms.map(o=>`· <b>${o[0]}(${o[1]})</b>: ${o[2]}`).join("<br>")}</div>`:""}
      <button class="btn primary" id="retryBtn">다시 태어난다 (석상이 바뀝니다)</button>
      <button class="btn" id="homeBtn">처음으로</button>
    </div>`);
  document.getElementById("retryBtn").onclick=()=>{ closeModal(); respawn(); };
  document.getElementById("homeBtn").onclick=()=>{ closeModal(); showTitle(); };
}
function respawn(){
  px=7; py=8; dir="up"; cleared=0;
  spawnStatues(); updateHud(); mode="locked";
  showDialog([{sp:"염라대왕",text:"다시 왔느냐. 석상들이 새로 봉인되었다. 이번에는 부디..."}],()=>{ mode="explore"; });
}

/* ═══════════════ 출구 ═══════════════ */
function openExitConfirm(){
  mode="locked";
  openModal(`
    <div class="box mini">
      <p class="qtext" style="text-align:center;">출구가 검은 아가리를 벌리고 있다.<br><br><b class="yellow">진짜 나가시겠습니까?</b></p>
      <button class="btn" id="yesBtn">네</button>
      <button class="btn primary" id="noBtn">아니오</button>
    </div>`);
  document.getElementById("noBtn").onclick=()=>{ closeModal(); mode="explore"; };
  document.getElementById("yesBtn").onclick=()=>{
    document.getElementById("stage-wrap").classList.add("shake");
    setTimeout(()=>document.getElementById("stage-wrap").classList.remove("shake"),600);
    openModal(`
      <div class="box">
        <div class="title-big red">사망하였습니다</div>
        <p class="qtext" style="text-align:center;">언제까지 도망만 칠 텐가.</p>
        <button class="btn primary" id="retryBtn">다시 태어난다</button>
        <button class="btn" id="homeBtn">처음으로</button>
      </div>`);
    document.getElementById("retryBtn").onclick=()=>{ closeModal(); respawn(); };
    document.getElementById("homeBtn").onclick=()=>{ closeModal(); showTitle(); };
  };
}

/* ═══════════════ 엔딩 ═══════════════ */
function winSequence(){
  mode="locked"; yeomraVisible=true;
  finished=true;
  let clearSec=(Date.now()-runStart)/1000;
  showDialog([
    {sp:"염라대왕", text:"...놀랍구나. 열다섯 석상의 봉인을 모두 풀다니."},
    {sp:"염라대왕", text:`${playerName}. 공부하지 않은 죄, 이것으로 사면하노라.`},
    {sp:"염라대왕", text:"이승으로 돌아가거든 오늘 배운 것을 잊지 마라. 도망치지 말고... 스스로를 속이지도 마라."},
    {sp:"내레이션", text:"눈앞이 하얗게 밝아진다..."}
  ], ()=>{
    fade.innerHTML="";
    fade.style.background="#fff"; fade.style.opacity=1; fade.style.pointerEvents="auto";
    setTimeout(async ()=>{
      fade.style.background="#000"; fade.style.opacity=0; fade.style.pointerEvents="none";
      let res, label="이 기기 기록";
      let serverSec=null;
      if(SERVER_URL && sessionToken){
        serverSec=await submitScore(playerName);
      }
      if(serverSec!==null){
        try{
          await new Promise(r=>setTimeout(r,1200));
          const list=await fetchGlobalLB();
          const rank=list.filter(e=>e.sec<serverSec).length+1;
          const idx=list.findIndex(e=>e.name===playerName&&e.sec===serverSec);
          res={list, rank, entry:{name:playerName, sec:serverSec, ts:-1, idx}};
          clearSec=serverSec;
          label="전체 통합 랭킹";
        }catch(e){ res=await addRecord(playerName, clearSec); }
      } else {
        res=await addRecord(playerName, clearSec);
      }
      const rows=res.list.slice(0,10).map((e,i)=>{
        const me=(res.entry.ts===-1)? (i===res.entry.idx) : (e.ts===res.entry.ts);
        return `<div style="display:flex;justify-content:space-between;gap:8px;${me?'color:var(--lantern);font-weight:bold;':''}">
          <span>${i+1}위　${e.name}${me?" ◀":""}</span><span>${fmt(e.sec)}</span></div>`;
      }).join("");
      openModal(`
        <div class="box">
          <div class="title-big green" style="letter-spacing:2px;">생 환</div>
          <p class="qtext" style="text-align:center;">${eun(playerName)} 스터디카페 책상에서 눈을 떴다.<br>펼쳐진 책 위, 침 자국이 선명하다.</p>
          <div class="explain good" style="text-align:center;">
            🏆 칭호 획득<br><b style="font-size:20px;">「사자성어 대장군 ${playerName}」</b><br><br>
            클리어 시간 <b>${fmt(clearSec)}</b> · 전체 <b>${res.rank}위</b>
          </div>
          <div class="explain good">
            <div style="text-align:center; margin-bottom:8px;">👑 명예의 전당 · ${label}</div>
            ${rows}
          </div>
          <button class="btn primary" id="againBtn">한 번 더 모험한다</button>
          <button class="btn" id="homeBtn">처음으로</button>
        </div>`);
      document.getElementById("againBtn").onclick=()=>{ closeModal(); enterHellDirect(); };
      document.getElementById("homeBtn").onclick=()=>{ closeModal(); yeomraVisible=false; showTitle(); };
    },1400);
  });
}
function enterHellDirect(){
  scene="hell"; px=7; py=8; dir="up"; cleared=0; yeomraVisible=false;
  hudL.textContent=`${playerName} · 한자성어 나라`;
  spawnStatues(); updateHud(); mode="explore";
}

showTitle();

/* ═══════════════ PWA 서비스 워커 등록 + 자동 업데이트 ═══════════════ */
if("serviceWorker" in navigator){
  let refreshing=false;
  /* 새 서비스 워커가 제어권을 넘겨받으면(=새 버전 활성화) 한 번만 새로고침 */
  navigator.serviceWorker.addEventListener("controllerchange",()=>{
    if(refreshing) return;
    refreshing=true;
    location.reload();
  });
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("./sw.js").then(reg=>{
      /* 주기적으로 새 버전 확인(재접속 없이도 갱신 감지) */
      setInterval(()=>{ reg.update().catch(()=>{}); }, 60*60*1000); // 1시간마다
      reg.addEventListener("updatefound",()=>{
        const nw=reg.installing;
        if(!nw) return;
        nw.addEventListener("statechange",()=>{
          /* 새 워커가 설치 완료되고, 기존 컨트롤러가 있으면(=업데이트 상황) 즉시 활성화 요청 */
          if(nw.state==="installed" && navigator.serviceWorker.controller){
            nw.postMessage&&nw.postMessage("skip");
            /* skipWaiting은 sw install에서 이미 호출되므로 controllerchange가 곧 발생 */
          }
        });
      });
    }).catch(()=>{});
  });
}
</script>

    ctx.fillStyle="#fffdf5"; ctx.fillRect(X+6,Y+12,12,9);                    // 책
    ctx.fillStyle="#e8636f"; ctx.fillRect(X+11,Y+12,2,9);
    ctx.fillStyle="#3f7f5f"; ctx.fillRect(X+22,Y+8,6,4);                     // 스탠드
    ctx.fillStyle="#2c5c44"; ctx.fillRect(X+24,Y+12,2,8);
    ctx.fillStyle="#fff6c9"; ctx.globalAlpha=.5; ctx.beginPath(); ctx.arc(X+22,Y+16,7,0,7); ctx.fill(); ctx.globalAlpha=1;
  }
  // 빈 의자(분홍 스툴) - 한 자리만
  if(!(px===EMPTY_SEAT[0]&&py===EMPTY_SEAT[1])){
    const X=EMPTY_SEAT[0]*TILE,Y=EMPTY_SEAT[1]*TILE;
    ctx.fillStyle="#ff9eb5"; rr(X+8,Y+10,16,12,6); ctx.fill();
    ctx.fillStyle="#e07f98"; ctx.fillRect(X+10,Y+22,3,5); ctx.fillRect(X+19,Y+22,3,5);
    ctx.fillStyle="#ffd3de"; ctx.fillRect(X+11,Y+13,5,3);
  }
  // 학생들
  for(const s of STUDENTS) drawStudent(s);
  // 입구 매트
  ctx.fillStyle="#7fb8a0"; rr(7*TILE+3,(ROWS-1)*TILE+3,TILE-6,TILE-10,4); ctx.fill();
  ctx.fillStyle="#eafff4"; ctx.font="8px NeoDGM,monospace"; ctx.textAlign="center";
  ctx.fillText("WELCOME",7*TILE+16,(ROWS-1)*TILE+18);
}

/* ── 학생 캐릭터 ── */
function drawStudent(s){
  const X=s.x*TILE, Y=s.y*TILE;
  const bob=Math.sin(T*2+s.x+s.y)*1.2;
  ctx.fillStyle="#00000030"; ctx.beginPath(); ctx.ellipse(X+16,Y+28,10,3,0,0,7); ctx.fill();
  if(s.type==="dog"){
    ctx.fillStyle="#8a5a2b"; rr(X+7,Y+14+bob,18,12,6); ctx.fill();
    ctx.fillStyle="#a06b35";
    ctx.beginPath(); ctx.arc(X+16,Y+10+bob,9,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(X+9,Y+5+bob,4,0,7); ctx.arc(X+16,Y+3+bob,4.5,0,7); ctx.arc(X+23,Y+5+bob,4,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(X+6,Y+13+bob,3.5,0,7); ctx.arc(X+26,Y+13+bob,3.5,0,7); ctx.fill();
    ctx.fillStyle="#2a2a2a"; ctx.fillRect(X+12,Y+8+bob,2,3); ctx.fillRect(X+18,Y+8+bob,2,3);
    ctx.fillStyle="#1a1a1a"; ctx.beginPath(); ctx.arc(X+16,Y+13+bob,2,0,7); ctx.fill();
    ctx.fillStyle="#a06b35"; ctx.beginPath(); ctx.arc(X+27,Y+19+bob,3,0,7); ctx.fill();
  } else {
    const hair={boy1:"#2a2a2a",boy2:"#5a3a22",girl1:"#7c4a1e",girl2:"#1a1a1a"}[s.type];
    const cloth={boy1:"#4a6fb5",boy2:"#3f7f5f",girl1:"#e8b23a",girl2:"#d977a8"}[s.type];
    const girl=s.type.startsWith("girl");
    ctx.fillStyle=cloth; rr(X+7,Y+16+bob,18,11,5); ctx.fill();
    ctx.fillStyle="#ffe0bd"; rr(X+6,Y+2+bob,20,17,8); ctx.fill();
    ctx.fillStyle=hair; rr(X+5,Y+bob,22,8,7); ctx.fill();
    if(girl){ ctx.fillRect(X+4,Y+4+bob,4,14); ctx.fillRect(X+24,Y+4+bob,4,14); }
    else { ctx.fillRect(X+5,Y+4+bob,3,5); ctx.fillRect(X+24,Y+4+bob,3,5); }
    ctx.fillStyle="#2a2a2a"; ctx.fillRect(X+11,Y+10+bob,3,4); ctx.fillRect(X+18,Y+10+bob,3,4);
    ctx.fillStyle="#ffb3ab"; ctx.fillRect(X+8,Y+14+bob,3,2); ctx.fillRect(X+21,Y+14+bob,3,2);
  }
  ctx.fillStyle="#fff3dd"; ctx.font="8px NeoDGM,monospace"; ctx.textAlign="center";
  ctx.fillText(s.name, X+TILE/2, Y-2);
}

/* ── 저승 ── */
function drawHell(){
  ctx.fillStyle="#1f1433"; ctx.fillRect(0,0,cv.width,cv.height);
  // 돌바닥
  for(let y=1;y<ROWS-1;y++)for(let x=1;x<COLS-1;x++){
    ctx.fillStyle=((x+y)%2? "#342650":"#3b2b59");
    rr(x*TILE+1,y*TILE+1,TILE-2,TILE-2,4); ctx.fill();
  }
  // 벽 장식
  ctx.fillStyle="#150d24"; ctx.fillRect(0,0,cv.width,TILE); ctx.fillRect(0,(ROWS-1)*TILE,cv.width,TILE);
  ctx.fillRect(0,0,TILE,cv.height); ctx.fillRect((COLS-1)*TILE,0,TILE,cv.height);
  // 흔들리는 홍등
  for(let i=0;i<4;i++){
    const lx=(2.5+i*3.3)*TILE + Math.sin(T*1.8+i)*3;
    ctx.strokeStyle="#5c4a2a"; ctx.beginPath(); ctx.moveTo((2.5+i*3.3)*TILE,0); ctx.lineTo(lx,14); ctx.stroke();
    emoji("🏮",lx,30,18);
  }
  // 안개
  ctx.fillStyle="#ffffff";
  for(let i=0;i<3;i++){
    const fx=((T*12+i*160)%(cv.width+120))-60;
    ctx.globalAlpha=.05;
    ctx.beginPath(); ctx.ellipse(fx,120+i*70,70,16,0,0,7); ctx.fill();
  }
  ctx.globalAlpha=1;
  // 염라대왕 단상
  if(yeomraVisible){
    ctx.fillStyle="#4a1526"; rr(5*TILE,1*TILE-4,TILE*5,TILE*3,8); ctx.fill();
    ctx.fillStyle="#6b1f36"; rr(5*TILE+6,1*TILE+2,TILE*5-12,TILE*3-12,6); ctx.fill();
  }
  // 출구(붉은 문)
  const ex=EXIT[0]*TILE, ey=EXIT[1]*TILE;
  ctx.fillStyle="#c9414e"; ctx.fillRect(ex-6,ey-10,TILE+12,8);
  ctx.fillRect(ex-6,ey-10,6,TILE+8); ctx.fillRect(ex+TILE,ey-10,6,TILE+8);
  ctx.fillStyle="#000"; ctx.fillRect(ex+2,ey-2,TILE-4,TILE);
  ctx.fillStyle="#ff9eb5"; ctx.font="11px NeoDGM,monospace"; ctx.textAlign="center";
  ctx.fillText("출구",ex+TILE/2,ey+14);
}
function drawStatues(){
  statues.forEach((s,i)=>{
    const X=s.x*TILE, Y=s.y*TILE;
    const bob=s.cleared?0:Math.sin(T*2.4+i)*1.6;
    ctx.globalAlpha=s.cleared?.4:1;
    // 받침
    ctx.fillStyle="#8f88ad"; rr(X+5,Y+19,TILE-10,10,4); ctx.fill();
    ctx.fillStyle="#a9a2c6"; rr(X+8,Y+15,TILE-16,7,3); ctx.fill();
    // 은은한 빛
    if(!s.cleared){
      ctx.fillStyle="#c9b8ff"; ctx.globalAlpha=.14+.06*Math.sin(T*2.4+i);
      ctx.beginPath(); ctx.arc(X+TILE/2,Y+10,13,0,7); ctx.fill();
      ctx.globalAlpha=1;
    }
    emoji(s.icon, X+TILE/2, Y+16+bob, 17);
    ctx.globalAlpha=1;
    if(s.cleared) emoji("✨",X+TILE/2,Y+8,12);
  });
}

/* ── 치비 캐릭터 ── */
function drawPlayer(){
  const X=px*TILE+2, Y=py*TILE-8;
  const bob=(stepFrame%2)?1:0;
  const blink=(T%3.4)<.14;
  // 그림자
  ctx.fillStyle="#00000030"; ctx.beginPath(); ctx.ellipse(X+14,py*TILE+27,10,3.5,0,0,7); ctx.fill();
  // 발
  ctx.fillStyle="#8a5a3a";
  ctx.fillRect(X+8,Y+30+bob,5,4); ctx.fillRect(X+16,Y+30-bob,5,4);
  // 몸(노란 후드)
  ctx.fillStyle="#ffd166"; rr(X+6,Y+21+bob,17,11,4); ctx.fill();
  ctx.fillStyle="#f4b942"; ctx.fillRect(X+13,Y+23+bob,3,8); // 지퍼
  // 팔
  ctx.fillStyle="#ffd166"; ctx.fillRect(X+3,Y+22+bob,4,7); ctx.fillRect(X+22,Y+22+bob,4,7);
  // 머리(크고 둥글게)
  ctx.fillStyle="#ffe0bd"; rr(X+3,Y+2+bob,23,20,9); ctx.fill();
  // 머리카락
  ctx.fillStyle="#5a3a22";
  rr(X+2,Y+bob,25,10,8); ctx.fill();
  ctx.fillRect(X+2,Y+6+bob,5,8); ctx.fillRect(X+22,Y+6+bob,5,8);
  // 뻗친 머리
  ctx.strokeStyle="#5a3a22"; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(X+14,Y+bob); ctx.quadraticCurveTo(X+17,Y-5+bob,X+20,Y-2+bob); ctx.stroke();
  if(dir==="up"){ ctx.fillStyle="#5a3a22"; rr(X+4,Y+3+bob,21,17,8); ctx.fill(); return; }
  // 눈 + 볼터치
  ctx.fillStyle="#2a2a2a";
  const ey=Y+12+bob;
  if(blink){
    ctx.fillRect(X+8,ey+2,5,2); ctx.fillRect(X+17,ey+2,5,2);
  }else if(dir==="down"){
    ctx.fillRect(X+9,ey,4,5); ctx.fillRect(X+17,ey,4,5);
    ctx.fillStyle="#fff"; ctx.fillRect(X+10,ey+1,2,2); ctx.fillRect(X+18,ey+1,2,2);
  }else if(dir==="left"){
    ctx.fillRect(X+6,ey,4,5); ctx.fillRect(X+14,ey,4,5);
    ctx.fillStyle="#fff"; ctx.fillRect(X+7,ey+1,2,2); ctx.fillRect(X+15,ey+1,2,2);
  }else{
    ctx.fillRect(X+12,ey,4,5); ctx.fillRect(X+20,ey,4,5);
    ctx.fillStyle="#fff"; ctx.fillRect(X+13,ey+1,2,2); ctx.fillRect(X+21,ey+1,2,2);
  }
  ctx.fillStyle="#ffb3ab";
  ctx.fillRect(X+5,ey+5,4,3); ctx.fillRect(X+20,ey+5,4,3);
}

/* ── 염라대왕(치비) ── */

  ctx.save(); ctx.translate(X+38,Y+22); ctx.rotate(.35); ctx.fillRect(-6,-2,13,3); ctx.restore();
  ctx.save(); ctx.translate(X+66,Y+22); ctx.rotate(-.35); ctx.fillRect(-7,-2,13,3); ctx.restore();
  ctx.fillRect(X+36,Y+26,5,6); ctx.fillRect(X+63,Y+26,5,6);
  ctx.fillStyle="#fff"; ctx.fillRect(X+37,Y+27,2,2); ctx.fillRect(X+64,Y+27,2,2);
  // 볼터치(무섭지만 귀엽게)

  // 수염
  ctx.fillStyle="#3a3644"; rr(X+40,Y+40,24,16,6); ctx.fill();
  ctx.fillStyle="#565064"; ctx.fillRect(X+46,Y+42,3,12); ctx.fillRect(X+55,Y+42,3,12);
  // 도포
  ctx.fillStyle="#a3273a"; rr(X+10,Y+50,84,44,10); ctx.fill();

  ctx.fillStyle="#ffb85c"; ctx.fillRect(X+48,Y+54,8,36);
  // 어깨 구름 문양
  emoji("☁️",X+18,Y+62,11); emoji("☁️",X+88,Y+62,11);
}

function render(){
  T=performance.now()/1000;
  ctx.clearRect(0,0,cv.width,cv.height);
  if(scene==="cafe") drawCafe(); else { drawHell(); drawStatues(); drawYeomra(); }
  if(mode!=="title") drawPlayer();
  // 따뜻한 비네트(카페만)
  if(scene==="cafe"){
    const g=ctx.createRadialGradient(cv.width/2,cv.height/2,120,cv.width/2,cv.height/2,320);
    g.addColorStop(0,"#ffb85c00"); g.addColorStop(1,"#7a4a1a2e");
    ctx.fillStyle=g; ctx.fillRect(0,0,cv.width,cv.height);
  }
  requestAnimationFrame(render);
}
requestAnimationFrame(render);

/* ═══════════════ 대화 시스템 ═══════════════ */
function showDialog(lines, done){
  dialogQueue=[...lines]; dialogDone=done||null;
  dlg.style.display="block"; nextDialog();
}
function nextDialog(){
  if(typing){ clearInterval(typing); typing=null; dlgTxt.textContent=fullText; return; }
  if(dialogQueue.length===0){
    dlg.style.display="none";
    const cb=dialogDone; dialogDone=null;
    if(cb) cb(); return;
  }
  const {sp,text}=dialogQueue.shift();
  dlgSp.textContent=sp; fullText=text; dlgTxt.textContent="";
  let i=0;
  typing=setInterval(()=>{
    dlgTxt.textContent=fullText.slice(0,++i);
    if(i>=fullText.length){ clearInterval(typing); typing=null; }
  },26);
}
dlg.addEventListener("click", nextDialog);
cv.addEventListener("click", ()=>{ if(dlg.style.display==="block") nextDialog(); });

/* ═══════════════ 이동 ═══════════════ */
const DIRS={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]};
function tryMove(d){
  if(mode!=="cafe"&&mode!=="explore") return;
  if(dlg.style.display==="block"||modal.style.display==="block") return;
  dir=d;
  const [dx,dy]=DIRS[d];
  const nx=px+dx, ny=py+dy;
  if(scene==="cafe"){
    const stu=studentAt(nx,ny);
    if(stu){ dir=d; showDialog([{sp:stu.name, text:stu.line}]); return; }
  }
  if(scene==="hell"){
    const st=statueAt(nx,ny);
    if(st){ if(!st.cleared) openQuiz(st); return; }
    if(nx===EXIT[0]&&ny===EXIT[1]){ openExitConfirm(); return; }
  }
  if(blocked(nx,ny)) return;
  px=nx; py=ny; stepFrame++;
  if(scene==="cafe" && mode==="cafe" && px===EMPTY_SEAT[0] && py===EMPTY_SEAT[1]) openSeatChoice();
}
document.addEventListener("keydown",e=>{
  const k=e.key;
  if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(k)) e.preventDefault();
  if(dlg.style.display==="block" && (k===" "||k==="Enter"||k==="z"||k==="Z")){ nextDialog(); return; }
  const map={ArrowUp:"up",w:"up",W:"up",ArrowDown:"down",s:"down",S:"down",ArrowLeft:"left",a:"left",A:"left",ArrowRight:"right",d:"right",D:"right"};
  if(map[k]) tryMove(map[k]);
});
/* 캔버스 스와이프로 이동 */
let swX=0, swY=0, swT=0;
cv.addEventListener("touchstart",e=>{
  if(e.touches.length!==1) return;
  swX=e.touches[0].clientX; swY=e.touches[0].clientY; swT=Date.now();
},{passive:true});
cv.addEventListener("touchend",e=>{
  const t=e.changedTouches[0];
  const dx=t.clientX-swX, dy=t.clientY-swY;
  const dist=Math.hypot(dx,dy);
  if(dist<24 || Date.now()-swT>600) return; // 짧으면 탭으로 처리
  const dirName=Math.abs(dx)>Math.abs(dy) ? (dx>0?"right":"left") : (dy>0?"down":"up");
  const steps=Math.min(4, Math.floor(dist/48)+1);
  for(let i=0;i<steps;i++) tryMove(dirName);
},{passive:true});
document.querySelectorAll("#pad button").forEach(b=>{
  let t=null;
  const go=()=>tryMove(b.dataset.d);
  b.addEventListener("pointerdown",e=>{e.preventDefault();go();t=setInterval(go,170);});
  ["pointerup","pointerleave","pointercancel"].forEach(ev=>b.addEventListener(ev,()=>{clearInterval(t);t=null;}));
});

/* ═══════════════ ① 스터디카페 ═══════════════ */

/* ═══════════════ ② 한자성어 나라 ═══════════════ */
function enterHell(){
  scene="hell"; px=7; py=8; dir="up";
  statues=[]; cleared=0; yeomraVisible=true;
  hudL.textContent=`${playerName} · 한자성어 나라`; hudR.textContent="";
  fade.innerHTML=""; fade.style.opacity=0; fade.style.pointerEvents="none";
  mode="locked";
  setTimeout(()=>{
    showDialog([
      {sp:playerName, text:"...여긴 어디지?"},
      {sp:"염라대왕", text:"눈을 떴느냐. 이곳은 이승과 저승 사이, 한자성어 나라이니라."},
      {sp:"염라대왕", text:"너는 죄를 저질렀으므로, 이 한자성어 나라를 모험해야 한다."},
      {sp:playerName, text:"제, 제가 무슨 죄를 저질렀죠?"},
      {sp:"염라대왕", text:"공부하지 않은 죄. 최선을 다하지 않은 죄."},
      {sp:"염라대왕", text:"최선을 다하지 않았으면서 최선을 다한 척한 죄. 주변을 속이고, 결국 자신까지 속인 죄."},
      {sp:"염라대왕", text:"결국 공부한 것도 안 한 것도 아닌 채 시간을 낭비한 죄. ...그 죄를 달게 받아라."},
      {sp:"내레이션", text:"염라대왕이 연기처럼 사라지고, 사방에 석상들이 나타났다!"},
      {sp:"내레이션", text:`석상 ${STATUE_COUNT}개에 봉인된 사자성어를 모두 풀어야 이승으로 돌아갈 수 있다.`}
    ], ()=>{
      yeomraVisible=false; spawnStatues(); mode="explore"; updateHud();
    });
  },400);
}
function spawnStatues(){
  const icons=shuffle(STATUE_ICONS).slice(0,STATUE_COUNT);
  const idioms=shuffle(IDIOMS).slice(0,STATUE_COUNT);
  const cells=[];
  for(let y=2;y<=8;y++)for(let x=1;x<=13;x++){
    if(x===px&&y===py) continue;
    if(Math.abs(x-px)+Math.abs(y-py)<=1) continue;
    cells.push([x,y]);
  }
  const spots=shuffle(cells).slice(0,STATUE_COUNT);
  statues=spots.map(([x,y],i)=>({x,y,icon:icons[i],idiom:idioms[i],cleared:false}));
  runStart=Date.now(); finished=false;
}
const fmt=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(Math.floor(s%60)).padStart(2,"0")}`;
function updateHud(){
  const t=(runStart&&!finished)? ` · ⏱ ${fmt((Date.now()-runStart)/1000)}` : "";
  hudR.textContent=`✨ 석상 정화 ${cleared}/${STATUE_COUNT}${t}`;
}
setInterval(()=>{ if(scene==="hell"&&runStart&&!finished) updateHud(); },500);

/* ═══════════════ 순위표 저장 ═══════════════ */
async function lbLoad(){
  if(window.storage){
    try{ const r=await window.storage.get("idiom_lb"); return r?JSON.parse(r.value):[]; }
    catch(e){ return []; }
  }
  try{ const v=localStorage.getItem("idiom_lb"); return v?JSON.parse(v):memLB; }catch(e){ return memLB; }
}
async function lbSave(list){
  memLB=list;
  if(window.storage){ try{ await window.storage.set("idiom_lb", JSON.stringify(list)); return; }catch(e){} }
  try{ localStorage.setItem("idiom_lb", JSON.stringify(list)); }catch(e){}
}
async function postRecord(name,sec){
  try{
    await fetch(SERVER_URL,{
      method:"POST", mode:"no-cors",
      headers:{"Content-Type":"text/plain"},
      body:JSON.stringify({name, sec:Math.round(sec)})
    });
  }catch(e){}
}
async function fetchGlobalLB(){
    const res=await fetch(SERVER_URL+"?t="+Date.now(),{cache:"no-store"});
  if(!res.ok) throw new Error("server");
  const list=await res.json();
  return list.sort((a,b)=>a.sec-b.sec);
}
async function showRankingModal(){
  openModal(`<div class="box mini"><p class="qtext" style="text-align:center;">랭킹을 불러오는 중...</p></div>`);
  let list=[], label="이 기기 기록";
  if(SERVER_URL){
    try{ list=await fetchGlobalLB(); label="전체 통합 랭킹"; }
    catch(e){ list=await lbLoad(); }
  } else { list=await lbLoad(); }
  list.sort((a,b)=>a.sec-b.sec);
  const rows=list.slice(0,20).map((e,i)=>
    `<div style="display:flex;justify-content:space-between;gap:8px;"><span>${i+1}위　${e.name}</span><span>${fmt(e.sec)}</span></div>`
  ).join("") || `<div style="text-align:center;">아직 기록이 없습니다</div>`;
  openModal(`
    <div class="box">
      <div class="title-big yellow" style="font-size:24px; letter-spacing:2px;">👑 ${label}</div>
      <div class="explain good">${rows}</div>
      <button class="btn primary" id="closeLb">닫기</button>
    </div>`);
  document.getElementById("closeLb").onclick=()=>{ closeModal(); showTitle(); };
}
async function addRecord(name,sec){
  const list=await lbLoad();
  const entry={name, sec:Math.round(sec), ts:Date.now()};
  list.push(entry);
  list.sort((a,b)=>a.sec-b.sec || a.ts-b.ts);
  const rank=list.indexOf(entry)+1;
  const trimmed=list.slice(0,50);
  await lbSave(trimmed);
  return {list:trimmed, rank, entry};
}

/* ═══════════════ 퀴즈 ═══════════════ */
function openQuiz(st){
  mode="locked";
  const [w,h,m,s]=st.idiom;
  const r=Math.random();
  let qhtml, options, answerIdx, correctSitu=null, optIdioms=null;
  if(r<0.70){
    /* 유형 1: 상황 제시 → 사자성어 고르기 */
    const wrongIds=shuffle(IDIOMS.filter(i=>i[0]!==w)).slice(0,3);
    options=shuffle([w,...wrongIds.map(i=>i[0])]);
    answerIdx=options.indexOf(w);
    optIdioms=options.map(o=>o===w?st.idiom:wrongIds.find(i=>i[0]===o));
    qhtml=`<span class="tag">【상황】</span> ${s}<br><br>이 상황에 가장 가까운 사자성어는?`;
  } else if(r<0.90){
    /* 유형 2: 사자성어 제시 → 알맞은 상황 고르기 */
    const wrongs=shuffle(IDIOMS.filter(i=>i[0]!==w)).slice(0,3).map(i=>i[3]);
    options=shuffle([s,...wrongs]);
    answerIdx=options.indexOf(s);
    correctSitu=s;
    qhtml=`<span class="tag">【${w}(${h})】</span><br>이 사자성어를 쓰기에 가장 알맞은 상황은?`;
  } else {
    /* 유형 3: 뜻 제시 → 사자성어 고르기 */
    const wrongIds=shuffle(IDIOMS.filter(i=>i[0]!==w)).slice(0,3);
    options=shuffle([w,...wrongIds.map(i=>i[0])]);
    answerIdx=options.indexOf(w);
    optIdioms=options.map(o=>o===w?st.idiom:wrongIds.find(i=>i[0]===o));
    qhtml=`<span class="tag">【뜻】</span> ${m}<br><br>이 뜻을 가진 사자성어는?`;
  }
  openModal(`
    <div class="box">
      <p class="qtext" style="text-align:center; font-size:24px; margin-bottom:6px;">${st.icon}</p>
      <p class="qtext">${qhtml}</p>
      ${options.map((o,i)=>`<button class="opt" data-i="${i}">${i+1}. ${o}</button>`).join("")}
    </div>`);
  modal.querySelectorAll(".opt").forEach(b=>{
    b.onclick=()=>{
      const i=+b.dataset.i;
      if(i===answerIdx) quizCorrect(st);
      else quizDeath(options[i], st.idiom, correctSitu, optIdioms);
    };
  });
  const keyH=e=>{
    const n=parseInt(e.key);
    if(n>=1&&n<=4){ const btn=modal.querySelectorAll(".opt")[n-1]; if(btn){ document.removeEventListener("keydown",keyH); btn.click(); } }
  };
  document.addEventListener("keydown",keyH);
  modal._keyH=keyH;
}
function quizCorrect(st){
  if(modal._keyH) document.removeEventListener("keydown",modal._keyH);
  const [w,h,m]=st.idiom;
  st.cleared=true; cleared++; updateHud();
  openModal(`
    <div class="box mini">
      <p class="qtext green" style="text-align:center; font-size:20px;">🎉 정답! 석상의 봉인이 풀렸다</p>
      <div class="explain good"><b>${w}(${h})</b><br>${m}</div>
      <button class="btn primary" id="okBtn">${cleared>=STATUE_COUNT?"...?":"계속 탐험한다"}</button>
    </div>`);
  document.getElementById("okBtn").onclick=()=>{
    closeModal();
    if(cleared>=STATUE_COUNT) winSequence(); else mode="explore";
  };
}
function quizDeath(pick, idiom, correctSitu, optIdioms){
  if(modal._keyH) document.removeEventListener("keydown",modal._keyH);
  const [w,h,m]=idiom;
  document.getElementById("stage-wrap").classList.add("shake");
  setTimeout(()=>document.getElementById("stage-wrap").classList.remove("shake"),600);
  const situLine = correctSitu ? `<br>알맞은 상황: <b>${correctSitu}</b>` : "";
  openModal(`
    <div class="box">
      <div class="title-big red">사 망</div>
      <p class="qtext">${eun(playerName)} 한자성어 나라에서 스러졌다...<br>염라대왕의 목소리가 들려온다. "공부하지 않은 죄가 이리도 무겁구나."</p>
      <div class="explain">
        네가 고른 답: <b>${pick}</b><br>정답: <b>${w}(${h})</b>${situLine}<br><br>${m}
      </div>
      ${optIdioms?`<div class="explain good"><b>보기 사자성어의 올바른 뜻</b><br>${optIdioms.map(o=>`· <b>${o[0]}(${o[1]})</b>: ${o[2]}`).join("<br>")}</div>`:""}
      <button class="btn primary" id="retryBtn">다시 태어난다 (석상이 바뀝니다)</button>
      <button class="btn" id="homeBtn">처음으로</button>
    </div>`);
  document.getElementById("retryBtn").onclick=()=>{ closeModal(); respawn(); };
  document.getElementById("homeBtn").onclick=()=>{ closeModal(); showTitle(); };
}
function respawn(){
  px=7; py=8; dir="up"; cleared=0;
  spawnStatues(); updateHud(); mode="locked";
  showDialog([{sp:"염라대왕",text:"다시 왔느냐. 석상들이 새로 봉인되었다. 이번에는 부디..."}],()=>{ mode="explore"; });
}

/* ═══════════════ 출구 ═══════════════ */
function openExitConfirm(){
  mode="locked";
  openModal(`
    <div class="box mini">
      <p class="qtext" style="text-align:center;">출구가 검은 아가리를 벌리고 있다.<br><br><b class="yellow">진짜 나가시겠습니까?</b></p>
      <button class="btn" id="yesBtn">네</button>
      <button class="btn primary" id="noBtn">아니오</button>
    </div>`);
  document.getElementById("noBtn").onclick=()=>{ closeModal(); mode="explore"; };
  document.getElementById("yesBtn").onclick=()=>{
    document.getElementById("stage-wrap").classList.add("shake");
    setTimeout(()=>document.getElementById("stage-wrap").classList.remove("shake"),600);
    openModal(`
      <div class="box">
        <div class="title-big red">사망하였습니다</div>
        <p class="qtext" style="text-align:center;">언제까지 도망만 칠 텐가.</p>
        <button class="btn primary" id="retryBtn">다시 태어난다</button>
        <button class="btn" id="homeBtn">처음으로</button>
      </div>`);
    document.getElementById("retryBtn").onclick=()=>{ closeModal(); respawn(); };
    document.getElementById("homeBtn").onclick=()=>{ closeModal(); showTitle(); };
  };
}

/* ═══════════════ 엔딩 ═══════════════ */
function winSequence(){
  mode="locked"; yeomraVisible=true;
  finished=true;
  const clearSec=(Date.now()-runStart)/1000;
  showDialog([
    {sp:"염라대왕", text:"...놀랍구나. 열다섯 석상의 봉인을 모두 풀다니."},
    {sp:"염라대왕", text:`${playerName}. 공부하지 않은 죄, 이것으로 사면하노라.`},
    {sp:"염라대왕", text:"이승으로 돌아가거든 오늘 배운 것을 잊지 마라. 도망치지 말고... 스스로를 속이지도 마라."},
    {sp:"내레이션", text:"눈앞이 하얗게 밝아진다..."}
  ], ()=>{
    fade.innerHTML="";
    fade.style.background="#fff"; fade.style.opacity=1; fade.style.pointerEvents="auto";
    setTimeout(async ()=>{
      fade.style.background="#000"; fade.style.opacity=0; fade.style.pointerEvents="none";
      let res, label="이 기기 기록";
      if(SERVER_URL){
        try{
          await postRecord(playerName, clearSec);
          await new Promise(r=>setTimeout(r,1500));
          const list=await fetchGlobalLB();
          const mySec=Math.round(clearSec);
          const rank=list.filter(e=>e.sec<mySec).length+1;
          const idx=list.findIndex(e=>e.name===playerName&&e.sec===mySec);
          res={list, rank, entry:{name:playerName, sec:mySec, ts:-1, idx}};
          label="전체 통합 랭킹";
        }catch(e){ res=await addRecord(playerName, clearSec); }
      } else {
        res=await addRecord(playerName, clearSec);
      }
      const rows=res.list.slice(0,10).map((e,i)=>{
        const me=(res.entry.ts===-1)? (i===res.entry.idx) : (e.ts===res.entry.ts);
        return `<div style="display:flex;justify-content:space-between;gap:8px;${me?'color:var(--lantern);font-weight:bold;':''}">
          <span>${i+1}위　${e.name}${me?" ◀":""}</span><span>${fmt(e.sec)}</span></div>`;
      }).join("");
      openModal(`
        <div class="box">
          <div class="title-big green" style="letter-spacing:2px;">생 환</div>
          <p class="qtext" style="text-align:center;">${eun(playerName)} 스터디카페 책상에서 눈을 떴다.<br>펼쳐진 책 위, 침 자국이 선명하다.</p>
          <div class="explain good" style="text-align:center;">
            🏆 칭호 획득<br><b style="font-size:20px;">「사자성어 대장군 ${playerName}」</b><br><br>
            클리어 시간 <b>${fmt(clearSec)}</b> · 전체 <b>${res.rank}위</b>
          </div>
          <div class="explain good">
            <div style="text-align:center; margin-bottom:8px;">👑 명예의 전당 · ${label}</div>
            ${rows}
          </div>
          <button class="btn primary" id="againBtn">한 번 더 모험한다</button>
          <button class="btn" id="homeBtn">처음으로</button>
        </div>`);
      document.getElementById("againBtn").onclick=()=>{ closeModal(); enterHellDirect(); };
      document.getElementById("homeBtn").onclick=()=>{ closeModal(); yeomraVisible=false; showTitle(); };
    },1400);
  });
}
function enterHellDirect(){
  scene="hell"; px=7; py=8; dir="up"; cleared=0; yeomraVisible=false;
  hudL.textContent=`${playerName} · 한자성어 나라`;
  spawnStatues(); updateHud(); mode="explore";
}

showTitle();

/* ═══════════════ PWA 서비스 워커 등록 + 자동 업데이트 ═══════════════ */
if("serviceWorker" in navigator){
  let refreshing=false;
  /* 새 서비스 워커가 제어권을 넘겨받으면(=새 버전 활성화) 한 번만 새로고침 */
  navigator.serviceWorker.addEventListener("controllerchange",()=>{
    if(refreshing) return;
    refreshing=true;
    location.reload();
  });
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("./sw.js").then(reg=>{
      /* 주기적으로 새 버전 확인(재접속 없이도 갱신 감지) */
      setInterval(()=>{ reg.update().catch(()=>{}); }, 60*60*1000); // 1시간마다
      reg.addEventListener("updatefound",()=>{
        const nw=reg.installing;
        if(!nw) return;
        nw.addEventListener("statechange",()=>{
          /* 새 워커가 설치 완료되고, 기존 컨트롤러가 있으면(=업데이트 상황) 즉시 활성화 요청 */
          if(nw.state==="installed" && navigator.serviceWorker.controller){
            nw.postMessage&&nw.postMessage("skip");
            /* skipWaiting은 sw install에서 이미 호출되므로 controllerchange가 곧 발생 */
          }
        });
      });
    }).catch(()=>{});
  });
}
</script>
